<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaturalHarmony UI</title>
  <script type="module" crossorigin src="./assets/index-BPR3tUnA.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-B063Wq6C.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>NaturalHarmony</h1>
      <div class="header-status">
        <div id="connection-status" class="disconnected">Disconnected</div>
        <button id="audio-toggle" class="audio-toggle" disabled>Start Audio</button>
        <span id="audio-status" class="audio-idle">Idle</span>
        <button id="panic" class="panic" disabled>PANIC</button>
      </div>
    </header>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="performance">Performance</button>
      <button class="tab-btn" data-tab="presets">Presets</button>
      <button class="tab-btn" data-tab="sensors">Sensors</button>
      <button class="tab-btn" data-tab="launchpad">Launchpad</button>
      <button class="tab-btn" data-tab="renderer">Renderer</button>
      <button class="tab-btn" data-tab="analysis">Analysis</button>
      <button class="tab-btn" data-tab="log">Log</button>
    </nav>
    <main class="tab-content">
      <section id="performance" class="tab-panel active">
        <div id="performance-controls"><p>Loading performance controls...</p></div>
      </section>
      <section id="presets" class="tab-panel">
        <div id="preset-browser"><p>Loading presets...</p></div>
        <div id="preset-upload"></div>
      </section>
      <section id="sensors" class="tab-panel">
        <div id="sensor-panel"><p>Loading sensors...</p></div>
        <div id="sensor-safety"><p>Loading sensor safety...</p></div>
      </section>
      <section id="launchpad" class="tab-panel">
        <div id="launchpad-mirror"><p>Launchpad mirror will appear when connected.</p></div>
      </section>
      <section id="renderer" class="tab-panel">
        <div id="renderer-section"><p>Loading renderer...</p></div>
      </section>
      <section id="analysis" class="tab-panel">
        <div id="analysis-panel"><p>Loading analysis tools...</p></div>
      </section>
      <section id="log" class="tab-panel">
        <div id="status-log"></div>
      </section>
    </main>
  </div>
</body>
</html>
