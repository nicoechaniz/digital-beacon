<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaturalHarmony UI</title>
</head>
<body>
  <div id="app">
    <header>
      <h1>NaturalHarmony</h1>
      <div id="connection-status" class="disconnected">Disconnected</div>
      <button id="panic" class="panic" disabled>PANIC</button>
    </header>
    <main>
      <section id="renderer-section">
        <h2>Renderer</h2>
        <select id="renderer-select" disabled>
          <option value="">Auto</option>
        </select>
        <div id="renderer-caps"></div>
      </section>
      <section id="status-log"></section>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
