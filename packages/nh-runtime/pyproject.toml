[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nh-runtime"
version = "0.1.0"
description = "Server/client runtime for NaturalHarmony"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = ["nh-core", "nh-model", "nh-presets", "nh-renderers", "nh-control", "websockets", "numpy"]

[tool.setuptools.packages.find]
where = ["src"]
