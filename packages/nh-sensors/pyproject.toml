[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nh-sensors"
version = "0.1.0"
description = "Sensor adapters for NaturalHarmony (EEG, IMU, simulator)"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = ["nh-core", "nh-model", "numpy", "scipy", "python-osc"]

[tool.setuptools.packages.find]
where = ["src"]
