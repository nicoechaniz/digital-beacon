[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nh-presets"
version = "0.1.0"
description = "Versioned preset/session management for NaturalHarmony"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = ["nh-core"]

[tool.setuptools.packages.find]
where = ["src"]
