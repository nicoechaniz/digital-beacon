[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nh-renderers"
version = "0.1.0"
description = "Renderer adapters for NaturalHarmony"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = ["nh-core", "nh-model", "nh-presets", "numpy", "sounddevice"]

[tool.setuptools.packages.find]
where = ["src"]
