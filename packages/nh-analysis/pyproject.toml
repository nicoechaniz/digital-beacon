[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nh-analysis"
version = "0.1.0"
description = "Analysis tools for NaturalHarmony (F0, harmonicity, mask, descriptors)"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = ["nh-core", "nh-presets", "numpy", "librosa", "scipy"]

[tool.setuptools.packages.find]
where = ["src"]
