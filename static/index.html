<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>digital-beacon</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a0f; color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 12px; min-height: 100vh;
        }
        h1 { text-align: center; font-weight: 300; letter-spacing: 2px; font-size: 1.3rem; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 8px; font-size: 0.7rem; }
        .spectrum {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 1px; height: 40px; max-width: 1500px;
            margin: 0 auto 12px; padding: 4px;
            background: #0d0d14; border-radius: 6px; border: 1px solid #1a1a2e;
        }
        .spectrum-bar { flex: 1; min-width: 2px; border-radius: 2px 2px 0 0; transition: height 0.1s, background 0.1s; opacity: 0.85; }
        .header {
            display: flex; justify-content: center; gap: 12px; align-items: center;
            margin-bottom: 8px; flex-wrap: wrap;
        }
        .pill { background: #12121a; border: 1px solid #1a1a2e; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; }
        .pill b { color: #1abc9c; }
        .conn-ok { color: #2ecc71; }
        .conn-bad { color: #e74c3c; }
        button.action {
            padding: 5px 10px; border-radius: 4px; border: 1px solid #e74c3c;
            background: transparent; color: #e74c3c; cursor: pointer;
            font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
        }
        button.action:hover { background: #e74c3c; color: #000; }
        .grid {
            display: grid; grid-template-columns: repeat(8, 1fr);
            gap: 3px; max-width: 1600px; margin: 0 auto 10px;
        }
        .band {
            background: #12121a; border-radius: 4px; padding: 3px 2px;
            text-align: center; border: 1px solid #1a1a2e;
            transition: border-color 0.15s; position: relative;
        }
        .band.sc-active { border-color: #1abc9c; background: #0e1c18; }
        .led {
            position: absolute; top: 2px; right: 2px;
            width: 5px; height: 5px; border-radius: 50%;
            background: #333; transition: background 0.05s;
        }
        .led.on { background: #e74c3c; box-shadow: 0 0 4px #e74c3c; }
        .band-label { font-size: 0.55rem; font-weight: 600; color: #1abc9c; }
        .band-freq { font-size: 0.48rem; color: #888; }
        .divider {
            font-size: 0.35rem; color: #444; text-transform: uppercase;
            letter-spacing: 1px; border-top: 1px solid #1a1a2e; padding-top: 1px; margin: 2px 0 1px;
        }
        .param-row { display: flex; align-items: center; gap: 2px; margin-bottom: 1px; }
        .param-row label { font-size: 0.38rem; color: #888; text-transform: uppercase; min-width: 14px; text-align: right; }
        .param-row input[type=range] { flex: 1; height: 10px; }
        .param-row .val { font-size: 0.38rem; color: #aaa; min-width: 22px; text-align: left; }
        input[type=range] { -webkit-appearance: none; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 8px; width: 8px;
            border-radius: 50%; background: currentColor; margin-top: -2px;
        }
        input[type=range]::-webkit-slider-runnable-track { height: 2px; background: #2a2a3e; border-radius: 1px; }
        .solo-btn {
            padding: 1px 4px; font-size: 0.38rem; font-weight: 700;
            letter-spacing: 0.5px; text-transform: uppercase;
            border: 1px solid #444; border-radius: 2px;
            background: transparent; color: #666; cursor: pointer;
            margin: 1px 0;
        }
        .solo-btn.on { background: #1abc9c; color: #000; border-color: #1abc9c; }
        .mix-section {
            max-width: 1600px; margin: 0 auto 8px; background: #12121a;
            border-radius: 6px; padding: 8px 12px; border: 1px solid #1a1a2e;
        }
        .mix-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; }
        .mix-param { text-align: center; }
        .mix-param input[type=range] { width: 100%; }
        .mix-param label.sl { display: block; font-size: 0.5rem; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 1px; }
        .mix-param .val { font-size: 0.5rem; }
        .lfo-section { margin-top: 6px; padding-top: 4px; border-top: 1px solid #1a1a2e; }
        select { background: #0d0d14; border: 1px solid #2a2a3e; color: #e0e0e0; padding: 3px 6px; border-radius: 3px; font-size: 0.65rem; }
        @media (max-width: 1400px) { .grid { grid-template-columns: repeat(8, 1fr); } }
        @media (max-width: 1200px) { .grid { grid-template-columns: repeat(6, 1fr); } }
        @media (max-width: 900px)  { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 600px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <h1>digital-beacon</h1>
    <p class="subtitle">32-band binaural + Shaper · LED=active · Shape=timbre · SC=side-chain</p>
    <div class="spectrum" id="spectrum"></div>

    <div class="header">
        <div class="pill">f1=<b id="f1-val">40.0</b>Hz</div>
        <div class="pill">voices=<b id="active-count">0</b>/32</div>
        <div class="pill">strum=<b id="strum-val">0.50</b>s</div>
        <div class="pill">WS <span id="conn" class="conn-bad">off</span></div>
        <button class="action" onclick="panic()">PANIC</button>
        <button class="action" style="border-color:#3498db; color:#3498db;" onclick="resetBeacon()">RESET</button>
        <input type="text" id="rec-name" placeholder="session name"
               style="background:#0d0d14;border:1px solid #2a2a3e;color:#e0e0e0;padding:4px 8px;border-radius:3px;font-size:0.65rem;width:140px;">
        <button id="rec-btn" class="action" style="border-color:#e74c3c; color:#e74c3c;"
                onclick="toggleRecord()">RECORD</button>
        <div class="pill" id="rec-status">ready</div>
    </div>

    <!-- Global controls: Mix + Envelope + Side-chain + LFO -->
    <div class="mix-section">
        <div class="mix-grid">
            <div class="mix-param"><label class="sl" style="color:#1abc9c;">Beacon M</label>
                <input type="range" min="0" max="3" step="0.05" value="0.9" id="master"
                       oninput="sendMaster(this.value); showVal('vmaster',parseFloat(this.value).toFixed(2))">
                <div class="val" id="vmaster">0.90</div></div>
            <div class="mix-param"><label class="sl" style="color:#e74c3c;">Shaper M</label>
                <input type="range" min="0" max="1" step="0.01" value="0.8" id="shaper-master"
                       oninput="sendGlobal('master',this.value); showVal('vsmaster',parseFloat(this.value).toFixed(2))">
                <div class="val" id="vsmaster">0.80</div></div>
            <div class="mix-param"><label class="sl" style="color:#e67e22;">Attack</label>
                <input type="range" min="0.001" max="2" step="0.001" value="0.01" id="attack"
                       oninput="sendGlobal('attack',this.value); showVal('vattack',parseFloat(this.value).toFixed(3))">
                <div class="val" id="vattack">0.010</div></div>
            <div class="mix-param"><label class="sl" style="color:#9b59b6;">Release</label>
                <input type="range" min="0.01" max="3" step="0.01" value="0.15" id="release"
                       oninput="sendGlobal('release',this.value); showVal('vrelease',parseFloat(this.value).toFixed(2))">
                <div class="val" id="vrelease">0.15</div></div>
            <div class="mix-param"><label class="sl" style="color:#3498db;">f1</label>
                <input type="range" min="20" max="200" step="1" value="40.40" id="f1-slider"
                       oninput="sendF1(this.value); showVal('vf1',this.value+'Hz')">
                <div class="val" id="vf1">40Hz</div></div>
            <div class="mix-param"><label class="sl" style="color:#3498db;">vsrate</label>
                <input type="range" min="0.25" max="2" step="0.01" value="1" id="vsrate-slider"
                       oninput="sendVsrate(this.value); showVal('vvsrate',parseFloat(this.value).toFixed(2))">
                <div class="val" id="vvsrate">1.00</div></div>
        </div>
        <!-- Side-chain + LFO row -->
        <div class="lfo-section">
            <div class="mix-grid">
                <div class="mix-param"><label class="sl" style="color:#f39c12;">Side-chain</label>
                    <input type="range" min="-1" max="1" step="0.01" value="0" id="sidechain"
                           oninput="sendGlobal('sidechain',this.value); showVal('vsc',parseFloat(this.value).toFixed(2))">
                    <div class="val" id="vsc">0.00</div></div>
                <div class="mix-param"><label class="sl" style="color:#1abc9c;">LFO Amt</label>
                    <input type="range" min="0" max="1" step="0.01" value="0" id="lfo-amount"
                           oninput="sendGlobal('lfo_amount',this.value); showVal('vlfoa',parseFloat(this.value).toFixed(2))">
                    <div class="val" id="vlfoa">0.00</div></div>
                <div class="mix-param"><label class="sl" style="color:#1abc9c;">LFO ÷</label>
                    <input type="range" min="1" max="16" step="1" value="1" id="lfo-div"
                           oninput="sendGlobal('lfo_rate_divisor',this.value); showVal('vlfod',this.value)">
                    <div class="val" id="vlfod">1</div></div>
                <div class="mix-param"><label class="sl" style="color:#1abc9c;">LFO wav</label>
                    <select id="lfo-wav" onchange="sendLfoWaveform(this.value)">
                        <option value="sine">sine</option>
                        <option value="triangle">triangle</option>
                        <option value="saw">saw</option>
                        <option value="square">square</option>
                        <option value="samplehold">s&h</option>
                    </select></div>
                <div class="mix-param"><label class="sl" style="color:#888;">Beacon lvl</label>
                    <div class="val" id="vbeacon-lvl" style="font-size:0.7rem; color:#f39c12;">0.00</div></div>
            </div>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <!-- Presets -->
    <div class="mix-section">
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; align-items:end;">
            <div><label style="display:block;font-size:0.5rem;color:#888;text-transform:uppercase;margin-bottom:2px;">Save</label>
                <input type="text" id="save-name" placeholder="name"
                       style="width:100%;background:#0d0d14;border:1px solid #2a2a3e;color:#e0e0e0;padding:4px 6px;border-radius:3px;font-size:0.7rem;">
                <button onclick="savePreset()" style="margin-top:4px;width:100%;padding:4px;border:1px solid #2ecc71;color:#2ecc71;background:transparent;border-radius:3px;cursor:pointer;font-size:0.6rem;font-weight:600;">SAVE</button></div>
            <div><label style="display:block;font-size:0.5rem;color:#888;text-transform:uppercase;margin-bottom:2px;">Load</label>
                <select id="load-select" style="width:100%;background:#0d0d14;border:1px solid #2a2a3e;color:#e0e0e0;padding:4px 6px;border-radius:3px;font-size:0.7rem;"><option value="">--</option></select>
                <button onclick="loadPreset()" style="margin-top:4px;width:100%;padding:4px;border:1px solid #3498db;color:#3498db;background:transparent;border-radius:3px;cursor:pointer;font-size:0.6rem;font-weight:600;">LOAD</button></div>
            <div><div id="preset-status" style="padding:6px;color:#888;font-size:0.65rem;">Ready</div></div>
        </div>
    </div>

<script>
const N = 32;
const grid = document.getElementById('grid');
const spectrum = document.getElementById('spectrum');

function showVal(id,t) { const e=document.getElementById(id); if(e) e.textContent=t; }

// Spectrum
for (let i=0;i<N;i++) {
  const b=document.createElement('div'); b.className='spectrum-bar'; b.id='spec'+(i+1);
  b.style.background='#3498db'; b.style.height='10%'; spectrum.appendChild(b);
}

// Cards: SPATIALIZER (horizontal gain) + SHAPER (gain, pan, phase) + SHAPE + LFO targets
const cards=[];
const scState={on:{},gain:{},az:{},dist:{},q:{}};
for (let n=1;n<=N;n++) {
  const c=document.createElement('div'); c.className='band'; c.dataset.n=n;
  c.innerHTML=`
    <div class="led" data-role="led"></div>
    <div class="band-label">H${String(n).padStart(2,'0')}</div>
    <div class="band-freq">${(40.40*n).toFixed(0)}Hz</div>
    <div class="divider" style="color:#1abc9c;">SPAT</div>
    <div class="param-row" style="color:#1abc9c;"><label>G</label>
      <input type="range" min="0" max="3" step="0.05" value="0.8" id="g${n}"
             oninput="sendB('gain',${n},this.value);showVal('gv${n}',parseFloat(this.value).toFixed(2))">
      <span class="val" id="gv${n}">0.80</span></div>
    <div class="param-row"><label>Az</label>
      <input type="range" min="-180" max="180" step="1" value="0" id="a${n}"
             oninput="sendB('az',${n},this.value);showVal('av${n}',Math.round(this.value)+'\u00B0')">
      <span class="val" id="av${n}">0\u00B0</span></div>
    <div class="param-row"><label>Ds</label>
      <input type="range" min="0" max="10" step="0.1" value="2" id="d${n}"
             oninput="sendB('dist',${n},this.value);showVal('dv${n}',parseFloat(this.value).toFixed(1))">
      <span class="val" id="dv${n}">2.0</span></div>
    <div class="param-row"><label>Q</label>
      <input type="range" min="0.01" max="2" step="0.01" value="0.5" id="q${n}"
             oninput="sendB('q',${n},this.value);showVal('qv${n}',parseFloat(this.value).toFixed(2))">
      <span class="val" id="qv${n}">0.50</span></div>
    <button class="solo-btn on" id="on${n}" onclick="toggleOn(${n},this)">ON</button>
    <div class="divider" style="color:#e74c3c;">SHAPER</div>
    <div class="param-row" style="color:#e74c3c;"><label>Gn</label>
      <input type="range" min="0" max="1" step="0.01" value="0.6" id="sg${n}"
             oninput="sendS('gain',${n},this.value);showVal('sgv${n}',parseFloat(this.value).toFixed(2))">
      <span class="val" id="sgv${n}">0.60</span></div>
    <div class="param-row"><label>Pn</label>
      <input type="range" min="-1" max="1" step="0.01" value="0" id="sp${n}"
             oninput="sendS('pan',${n},this.value);showVal('spv${n}',parseFloat(this.value).toFixed(2))">
      <span class="val" id="spv${n}">0.00</span></div>
    <div class="param-row"><label>Ph</label>
      <input type="range" min="0" max="360" step="1" value="0" id="sph${n}"
             oninput="sendS('phase_deg',${n},this.value);showVal('sphv${n}',Math.round(this.value)+'\u00B0')">
      <span class="val" id="sphv${n}">0\u00B0</span></div>
    <div class="divider" style="color:#f39c12;">TIMBRE</div>
    <div class="param-row" style="color:#f39c12;"><label>Shp</label>
      <input type="range" min="0" max="1" step="0.01" value="0" id="ssh${n}"
             oninput="sendS('shape',${n},this.value);showVal('sshv${n}',parseFloat(this.value).toFixed(2))">
      <span class="val" id="sshv${n}">0.00</span></div>
    <div class="divider" style="color:#1abc9c;">LFO</div>
    <div class="param-row"><label>G</label>
      <input type="range" min="0" max="1" step="0.01" value="0" id="slg${n}"
             oninput="sendS('lfo_gain',${n},this.value);showVal('slgv${n}',parseFloat(this.value).toFixed(2))">
      <span class="val" id="slgv${n}">0.00</span></div>
    <div class="param-row"><label>P</label>
      <input type="range" min="0" max="1" step="0.01" value="0" id="slp${n}"
             oninput="sendS('lfo_pan',${n},this.value);showVal('slpv${n}',parseFloat(this.value).toFixed(2))">
      <span class="val" id="slpv${n}">0.00</span></div>
    <div class="param-row"><label>Ph</label>
      <input type="range" min="0" max="1" step="0.01" value="0" id="slph${n}"
             oninput="sendS('lfo_phase',${n},this.value);showVal('slphv${n}',parseFloat(this.value).toFixed(2))">
      <span class="val" id="slphv${n}">0.00</span></div>`;
  grid.appendChild(c); cards.push(c);
  scState.on[n]=1;scState.gain[n]=0.8;scState.az[n]=0;scState.dist[n]=2;scState.q[n]=0.5;
}

let shaperState={f1:40,master_gain:0.8,voices:{}};

function applyShaperState(s) {
  shaperState=s;
  document.getElementById('f1-val').textContent=(s.f1||40).toFixed(1);
  document.getElementById('strum-val').textContent=(s.strum_period_s||0.5).toFixed(2);
  document.getElementById('vbeacon-lvl').textContent=(s.beacon_level||0).toFixed(2);
  let active=0;
  for (let n=1;n<=N;n++) {
    const v=s.voices[String(n)]||{};
    if (v.active) active++;
    const card=cards[n-1];
    card.querySelector('[data-role="led"]').classList.toggle('on',!!v.active);

    // Update sliders from state (if not focused)
    const upd=(id,val)=>{const e=document.getElementById(id);if(e&&document.activeElement!==e)e.value=val;};
    upd('sg'+n,v.gain!==undefined?v.gain:0.6); showVal('sgv'+n,(v.gain!==undefined?v.gain:0.6).toFixed(2));
    upd('sp'+n,v.pan!==undefined?v.pan:0); showVal('spv'+n,(v.pan!==undefined?v.pan:0).toFixed(2));
    upd('sph'+n,v.phase_deg!==undefined?v.phase_deg:0); showVal('sphv'+n,(v.phase_deg!==undefined?v.phase_deg:0)+'\u00B0');
    upd('ssh'+n,v.shape!==undefined?v.shape:0); showVal('sshv'+n,(v.shape!==undefined?v.shape:0).toFixed(2));
    upd('slg'+n,v.lfo_gain!==undefined?v.lfo_gain:0); showVal('slgv'+n,(v.lfo_gain!==undefined?v.lfo_gain:0).toFixed(2));
    upd('slp'+n,v.lfo_pan!==undefined?v.lfo_pan:0); showVal('slpv'+n,(v.lfo_pan!==undefined?v.lfo_pan:0).toFixed(2));
    upd('slph'+n,v.lfo_phase!==undefined?v.lfo_phase:0); showVal('slphv'+n,(v.lfo_phase!==undefined?v.lfo_phase:0).toFixed(2));

    const spec=document.getElementById('spec'+n);
    if (spec) {
      const gain=(v.gain!==undefined?v.gain:0.5)*(v.active?1:0.3);
      spec.style.height=Math.max(8,gain*100)+'%';
      spec.style.background=v.active?'#e74c3c':'#3498db';
    }
  }
  document.getElementById('active-count').textContent=active;
  // Global controls
  const gu=(id,val)=>upd(id,val);
  gu('shaper-master',s.master_gain); showVal('vsmaster',(s.master_gain||0.8).toFixed(2));
  gu('attack',s.global_attack_s); showVal('vattack',(s.global_attack_s||0.01).toFixed(3));
  gu('release',s.global_release_s); showVal('vrelease',(s.global_release_s||0.15).toFixed(2));
  gu('sidechain',s.sidechain_amount); showVal('vsc',(s.sidechain_amount||0).toFixed(2));
  gu('lfo-amount',s.lfo_amount); showVal('vlfoa',(s.lfo_amount||0).toFixed(2));
  gu('lfo-div',s.lfo_rate_divisor); showVal('vlfod',s.lfo_rate_divisor||1);
  document.getElementById('lfo-wav').value=s.lfo_waveform||'sine';
}

function applyScState() {
  for (let n=1;n<=N;n++) {
    const card=cards[n-1],isOn=scState.on[n]>0;
    card.classList.toggle('sc-active',isOn);
    const btn=card.querySelector('#on'+n);
    if (isOn){btn.classList.add('on');btn.textContent='ON';}
    else{btn.classList.remove('on');btn.textContent='OFF';}
    const u=(id,val)=>{const e=document.getElementById(id);if(e&&document.activeElement!==e)e.value=val;};
    u('g'+n,scState.gain[n]);showVal('gv'+n,scState.gain[n].toFixed(2));
    u('a'+n,scState.az[n]);showVal('av'+n,Math.round(scState.az[n])+'\u00B0');
    u('d'+n,scState.dist[n]);showVal('dv'+n,scState.dist[n].toFixed(1));
    u('q'+n,scState.q[n]);showVal('qv'+n,scState.q[n].toFixed(2));
  }
}

async function api(p,m='GET',b=null){
  const o={method:m,headers:{'Content-Type':'application/json'}};
  if(b)o.body=JSON.stringify(b);
  try{const r=await fetch(p,o);return await r.json();}catch(e){return null;}
}
function sendB(param,n,v){scState[param][n]=parseFloat(v);api('/api/harmonic/'+n+'/'+param,'POST',{[param]:parseFloat(v)});}
function sendS(param,n,v){api('/api/shaper/'+n+'/'+param,'POST',{[param]:parseFloat(v)});}
function sendGlobal(param,v){const f=parseFloat(v);api('/api/shaper/global/'+param,'POST',{[param]:f});}
function sendLfoWaveform(v){api('/api/shaper/global/lfo_waveform','POST',{lfo_waveform:v});}
function sendMaster(v){api('/api/master','POST',{master:parseFloat(v)});}
function sendF1(v){api('/api/f1','POST',{f1:parseFloat(v)});}
function sendVsrate(v){api('/api/vsource','POST',{rate:parseFloat(v)});}
function toggleOn(n,btn){const v=scState.on[n]?0:1;scState.on[n]=v;applyScState();api('/api/harmonic/'+n+'/on','POST',{on:v===1});}
function panic(){api('/api/panic','POST');}
function resetBeacon(){api('/api/reset','POST');for(let n=1;n<=N;n++){scState.on[n]=1;scState.gain[n]=0.8;scState.az[n]=0;scState.dist[n]=2;scState.q[n]=0.5;}applyScState();}

// Recording — RECORD/STOP toggle. Captures the live mixdown via
// PipeWire's monitor of the active sink (SC binaural + Shaper sines
// already coexist in the user's output, so the monitor sees both).
let recTimer=null;
function setRecUi(state){
  const btn=document.getElementById('rec-btn');
  const status=document.getElementById('rec-status');
  if(!btn||!status) return;
  if(state.running){
    btn.textContent='STOP';
    btn.style.background='#e74c3c';
    btn.style.color='#fff';
    btn.style.borderColor='#e74c3c';
    status.textContent='rec '+(state.elapsed_s||0).toFixed(0)+'s';
    status.style.color='#e74c3c';
  }else{
    btn.textContent='RECORD';
    btn.style.background='transparent';
    btn.style.color='#e74c3c';
    btn.style.borderColor='#e74c3c';
    status.textContent=state.last_error||'ready';
    status.style.color=state.last_error?'#e74c3c':'#888';
  }
}
function fmtElapsed(s){const m=Math.floor(s/60);const sec=Math.floor(s%60);return m+':'+String(sec).padStart(2,'0');}
async function toggleRecord(){
  const name=document.getElementById('rec-name').value.trim();
  const body=name?{name}:{};
  const r=await api('/api/record/toggle','POST',body);
  if(r&&r.ok){
    if(r.already_stopped){/* idempotent */ return pollRecStatus();}
    if(r.path&&!r.target){
      // stopped: show where it landed
      const status=document.getElementById('rec-status');
      if(status){status.textContent='saved '+(r.path.split('/').pop())+' ('+(r.size_bytes/1024).toFixed(0)+'KB)';status.style.color='#2ecc71';}
    }
    pollRecStatus();
  }else{
    const status=document.getElementById('rec-status');
    if(status){status.textContent='error: '+(r&&r.error);status.style.color='#e74c3c';}
  }
}
async function pollRecStatus(){
  const r=await api('/api/record/status');
  if(!r) return;
  setRecUi(r);
  if(r.running){
    if(!recTimer) recTimer=setInterval(async ()=>{
      const s=await api('/api/record/status');
      if(!s) return;
      if(!s.running){
        clearInterval(recTimer); recTimer=null;
        setRecUi(s);
        const status=document.getElementById('rec-status');
        if(status&&s.path){status.textContent='saved '+s.path.split('/').pop();status.style.color='#2ecc71';}
      }else{
        const status=document.getElementById('rec-status');
        if(status){status.textContent='rec '+fmtElapsed(s.elapsed_s);status.style.color='#e74c3c';}
      }
    },500);
  }else if(recTimer){
    clearInterval(recTimer); recTimer=null;
  }
}

// Presets — Save/Load capture BOTH the beacon (spatializer) and the Shaper
// (additive synth) state. Beacon side lives in this client (scState +
// sliders); Shaper side is server-authoritative (store.to_dict()) and
// arrives via WebSocket. gatherFullState() merges both halves into one
// payload for /api/presets/save. The server overlays the live Shaper
// snapshot so even unsynced UI is captured correctly.
async function gatherScState(){
  const bands=[];
  for(let n=1;n<=N;n++) bands.push({n,gain:scState.gain[n],az:scState.az[n],dist:scState.dist[n],q:scState.q[n],on:scState.on[n]});
  return {bands,master:parseFloat(document.getElementById('master').value)};
}
async function gatherFullState(){
  const sc = await gatherScState();
  return {
    f1: parseFloat(document.getElementById('f1-slider').value),
    vsrate: parseFloat(document.getElementById('vsrate-slider').value),
    master: sc.master,
    bands: sc.bands,
  };
}
async function applyScStateFromPreset(state){
  for(const b of(state.bands||[])){
    const n=b.n;if(n<1||n>32)continue;
    scState.gain[n]=b.gain;scState.az[n]=b.az;scState.dist[n]=b.dist;scState.q[n]=b.q!==undefined?b.q:0.5;scState.on[n]=b.on!==undefined?b.on:1;
    api('/api/harmonic/'+n+'/gain','POST',{gain:b.gain});
    api('/api/harmonic/'+n+'/az','POST',{az:b.az});
    api('/api/harmonic/'+n+'/dist','POST',{dist:b.dist});
    api('/api/harmonic/'+n+'/on','POST',{on:b.on===1});
  }
  if(state.master!==undefined){document.getElementById('master').value=state.master;api('/api/master','POST',{master:state.master});}
  applyScState();
}
function setPresetStatus(msg,color){const e=document.getElementById('preset-status');if(e){e.textContent=msg;e.style.color=color||'#888';}}
async function savePreset(){
  const name=document.getElementById('save-name').value.trim();
  if(!name){setPresetStatus('Enter name','#e67e22');return;}
  // Client payload = beacon side + the beacon-relevant globals.
  // The server overlays the live Shaper store so the saved preset
  // captures the actual current values, not just what the UI shows.
  const state=await gatherFullState();
  const r=await api('/api/presets/save','POST',{name,state});
  if(r&&r.ok){
    setPresetStatus('Saved: '+r.name+' ('+r.beacon_bands+' bands, '+r.shaper_voices+' voices)','#2ecc71');
    await loadPresetList();
  }
  else{setPresetStatus('Error: '+(r&&r.error),'#e74c3c');}
}
async function loadPreset(){
  const name=document.getElementById('load-select').value;
  if(!name){setPresetStatus('Select preset','#e67e22');return;}
  setPresetStatus('Loading...','#3498db');
  const r=await api('/api/presets/load','POST',{name});
  if(r&&r.ok){
    // Apply beacon side to client UI + SC via OSC
    const bc = (r.state.beacon) ? {
      bands: r.state.beacon.bands || [],
      master: r.state.beacon.master,
    } : {bands: r.state.bands || [], master: r.state.master};
    await applyScStateFromPreset(bc);
    // Apply beacon globals (f1, vsrate) on the client too so sliders sync
    if (bc.f1!==undefined && bc.f1!==null) {
      const el=document.getElementById('f1-slider'); if(el&&document.activeElement!==el) el.value=bc.f1;
      showVal('vf1', bc.f1+'Hz');
    }
    if (bc.vsrate!==undefined && bc.vsrate!==null) {
      const el=document.getElementById('vsrate-slider'); if(el&&document.activeElement!==el) el.value=bc.vsrate;
      showVal('vvsrate', parseFloat(bc.vsrate).toFixed(2));
    }
    setPresetStatus('Loaded: '+name,'#2ecc71');
    // Shaper side was applied server-side via store.*; the WebSocket will
    // push the new state and our applyShaperState() will sync the sliders.
  }
  else{setPresetStatus('Error: '+(r&&r.error),'#e74c3c');}
}
async function loadPresetList(){
  const r=await api('/api/presets');
  if(!r||!r.ok)return;
  const sel=document.getElementById('load-select');
  sel.innerHTML='<option value="">--</option>';
  for(const name of r.presets) sel.innerHTML+='<option value="'+name+'">'+name+'</option>';
}
async function loadSampleList(){
  const r=await api('/api/sample/list');
  if(!r||!r.ok)return;
  const sel=document.getElementById('sample-select');
  sel.innerHTML='<option value="">-- choose a sample --</option>';
  for(const path of r.samples){
    const name=path.split('/').pop();
    sel.innerHTML+='<option value="'+path+'">'+name+'</option>';
  }
}

// WebSocket
function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  const ws=new WebSocket(proto+'://'+location.host+'/ws');
  ws.onopen=()=>{document.getElementById('conn').textContent='on';document.getElementById('conn').className='conn-ok';};
  ws.onclose=()=>{document.getElementById('conn').textContent='off';document.getElementById('conn').className='conn-bad';setTimeout(connect,1000);};
  ws.onerror=()=>ws.close();
  ws.onmessage=(ev)=>{try{applyShaperState(JSON.parse(ev.data));}catch(e){console.error(e);}};
}
connect();
applyScState();
loadPresetList();
loadSampleList();
api('/api/state').then(s=>{if(s)applyShaperState(s);}).catch(e=>console.error(e));
pollRecStatus();

async function loadSample(){
  const sel=document.getElementById('sample-select');
  const path=sel.value;
  if(!path){setSampleStatus('Select a sample','#e67e22');return;}
  await _doLoad(path);
}
async function uploadAndLoadSample(){
  const input=document.getElementById('sample-file');
  if(!input.files||input.files.length===0){setSampleStatus('Choose a file','#e67e22');return;}
  const file=input.files[0];
  setSampleStatus('Uploading...','#3498db');
  const form=new FormData();
  form.append('file',file);
  try{
    const r=await fetch('/api/sample/upload',{method:'POST',body:form});
    const j=await r.json();
    if(j&&j.ok){await _doLoad(j.path);}
    else{setSampleStatus('Upload error: '+(j&&j.error),'#e74c3c');}
  }catch(e){setSampleStatus('Upload failed: '+e,'#e74c3c');}
}
async function _doLoad(path){
  setSampleStatus('Loading...','#3498db');
  const r=await api('/api/sample/load','POST',{path});
  if(r&&r.ok){setSampleStatus('Loaded: '+r.path.split('/').pop(),'#2ecc71'); startSamplePoll();}
  else{setSampleStatus('Error: '+(r&&r.error),'#e74c3c');}
}
async function stopSample(){
  const r=await api('/api/sample/stop','POST');
  if(r&&r.ok){setSampleStatus('Stopped','#888'); stopSamplePoll();}
}
async function defaultSampleMapping(){
  const r=await api('/api/sample/default','POST');
  if(r&&r.ok){setSampleStatus('Default mapping ('+r.targets.length+' targets)','#2ecc71');}
  else{setSampleStatus('Error: '+(r&&r.error),'#e74c3c');}
}
function setSampleStatus(msg,color){
  const e=document.getElementById('sample-status');
  if(e){e.textContent=msg;e.style.color=color||'#888';}
}
let samplePollTimer=null;
async function pollSample(){
  const r=await api('/api/sample/state');
  if(!r||!r.ok)return;
  const descEl=document.getElementById('sample-descriptor');
  if(descEl && r.descriptor){
    descEl.textContent=JSON.stringify(r.descriptor);
  }
  if(r.running){
    setSampleStatus('Running: '+(r.path||''),'#2ecc71');
  }
}
function startSamplePoll(){
  if(samplePollTimer)return;
  samplePollTimer=setInterval(pollSample,200);
}
function stopSamplePoll(){
  if(samplePollTimer){clearInterval(samplePollTimer);samplePollTimer=null;}
}

</script>

<!-- Sample layer panel -->

    <div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:end;margin-bottom:8px;">

                <option value="">-- choose a sample --</option>

        <button onclick="stopSample()" style="padding:4px 10px;border:1px solid #e74c3c;color:#e74c3c;background:transparent;border-radius:3px;cursor:pointer;font-size:0.6rem;font-weight:600;">STOP</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end;">
        <input type="file" id="sample-file" accept="audio/wav,.wav"
               style="width:100%;background:#0d0d14;border:1px solid #2a2a3e;color:#e0e0e0;padding:4px 6px;border-radius:3px;font-size:0.7rem;cursor:pointer;">
        <button onclick="uploadAndLoadSample()" style="padding:4px 10px;border:1px solid #f39c12;color:#f39c12;background:transparent;border-radius:3px;cursor:pointer;font-size:0.6rem;font-weight:600;">UPLOAD</button>
    </div>
    <button onclick="defaultSampleMapping()" style="margin-top:8px;width:100%;padding:4px;border:1px solid #3498db;color:#3498db;background:transparent;border-radius:3px;cursor:pointer;font-size:0.6rem;font-weight:600;">DEFAULT MAPPING</button>

    <div id="sample-descriptor" style="margin-top:4px;padding:6px;font-family:ui-monospace,monospace;font-size:0.6rem;color:#64748b;word-break:break-all;"></div>
</div>
